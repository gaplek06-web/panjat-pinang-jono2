<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panjat Pinang SDN Jono II</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #1a1c2c; font-family: 'Arial Black', sans-serif; height: 100vh; overflow: hidden; color: white; }
        
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; gap: 20px; text-align: center; padding: 20px;
        }
        .btn-action {
            padding: 15px 30px; font-size: 20px; background: #facc15; border: 4px solid #fff;
            cursor: pointer; border-radius: 12px; color: #000; font-family: inherit;
            box-shadow: 0 6px 0 #856404; transition: 0.1s;
        }

        #game-wrapper { display: flex; width: 100vw; height: 100vh; }
        .player-section { 
            flex: 1; position: relative; border: 2px solid #000; 
            background: url('bg.png') no-repeat center bottom; background-size: cover;
            image-rendering: pixelated; overflow: hidden;
        }
        
        /* Judul & HUD */
        .school-title {
            position: absolute; top: 55px; left: 50%; transform: translateX(-50%);
            background: #8b4513; padding: 4px 12px; border: 2px solid #fff;
            border-radius: 5px; font-size: 12px; z-index: 20; white-space: nowrap;
        }
        .hud { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 5px 10px; border: 2px solid #fff; border-radius: 5px; font-size: 12px; z-index: 20; }

        /* Tiang & Aset */
        .pole-group { position: absolute; left: 30%; transform: translateX(-50%); width: 40px; height: 65%; bottom: 85px; }
        .pole { width: 100%; height: 100%; background: url('pohon.png') repeat-y center; background-size: contain; }
        .puncak { position: absolute; top: -55px; left: 50%; transform: translateX(-50%); width: 110px; height: 70px; background: url('hadiah.png') no-repeat center; background-size: contain; }
        
        /* PEMAIN DENGAN WARNA BERBEDA */
        .player-sprite { 
            width: 65px; height: 65px; background: url('player.png') no-repeat center; 
            background-size: contain; position: absolute; left: 50%; transform: translateX(-50%); 
            bottom: 0; transition: bottom 0.4s; z-index: 5;
        }
        #p2-sprite { filter: hue-rotate(200deg); } /* Mengubah Merah jadi Biru */

        /* Penonton */
        .crowd { position: absolute; bottom: 10px; width: 100%; height: 50px; display: flex; justify-content: space-around; align-items: flex-end; z-index: 2; }
        .kid { width: 35px; height: 45px; background: url('player.png') no-repeat center; background-size: contain; animation: cheer 0.6s infinite alternate; }
        @keyframes cheer { from { transform: translateY(0); } to { transform: translateY(-10px); } }

        /* UI Kuis di Kanan */
        .ui-side { position: absolute; right: 10px; bottom: 20px; width: 190px; z-index: 30; }
        .quiz-box { background: url('box_ui.png') no-repeat center; background-size: 100% 100%; padding: 20px 10px; text-align: center; min-height: 220px; }
        .question { font-size: 30px; color: #facc15; display: block; margin-bottom: 15px; text-shadow: 2px 2px #000; }
        .btn-opt { width: 100%; background: #3b82f6; border: 2px solid #fff; padding: 10px; color: white; border-radius: 8px; font-size: 18px; cursor: pointer; margin-bottom: 5px; font-family: inherit; }
        
        .timer-container { height: 10px; background: #333; border: 1px solid #fff; border-radius: 5px; overflow: hidden; margin-bottom: 8px; }
        .timer-fill { width: 100%; height: 100%; background: #4ade80; }

        /* Responsif untuk 1P */
        .single-mode .player-section:nth-child(2) { display: none; }
        .single-mode .ui-side { width: 250px; right: 25px; }
        .winner-anim { animation: winJump 0.5s infinite !important; }
        @keyframes winJump { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-20px); } }
    </style>
</head>
<body>

    <div id="menu" class="overlay">
        <h1 style="color: #facc15; font-size: 30px; text-shadow: 3px 3px #000;">PANJAT PINANG<br>SDN JONO II</h1>
        <button class="btn-action" onclick="start(1)">1 PEMAIN</button>
        <button class="btn-action" onclick="start(2)" style="background: #4ade80;">2 PEMAIN (MULTI)</button>
    </div>

    <div id="victory" class="overlay" style="display:none;">
        <h2 id="win-txt" style="font-size: 32px; color: #facc15;"></h2>
        <button class="btn-action" onclick="location.reload()">MAIN LAGI</button>
    </div>

    <div id="game-wrapper">
        <div class="player-section" id="p1-area">
            <div class="hud">P1 SKOR: <span id="p1-score">0</span></div>
            <div class="school-title">SDN JONO II</div>
            <div class="pole-group">
                <div class="pole"></div><div class="puncak"></div>
                <div id="p1-sprite" class="player-sprite"></div>
            </div>
            <div class="crowd" id="p1-crowd"></div>
            <div class="ui-side">
                <div class="timer-container"><div id="p1-timer" class="timer-fill"></div></div>
                <div class="quiz-box">
                    <span class="question" id="p1-q"></span>
                    <div id="p1-opts"></div>
                </div>
            </div>
        </div>

        <div class="player-section" id="p2-area">
            <div class="hud">P2 SKOR: <span id="p2-score">0</span></div>
            <div class="school-title">SDN JONO II</div>
            <div class="pole-group">
                <div class="pole"></div><div class="puncak"></div>
                <div id="p2-sprite" class="player-sprite"></div>
            </div>
            <div class="crowd" id="p2-crowd"></div>
            <div class="ui-side">
                <div class="timer-container"><div id="p2-timer" class="timer-fill"></div></div>
                <div class="quiz-box">
                    <span class="question" id="p2-q"></span>
                    <div id="p2-opts"></div>
                </div>
            </div>
        </div>
    </div>

<script>
    const state = { p1: { s:0, p:1, a:0, t:100 }, p2: { s:0, p:1, a:0, t:100 }, m:1, active:false };

    function start(mode) {
        state.m = mode;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-wrapper').className = mode === 1 ? 'single-mode' : '';
        state.active = true;
        ['p1', 'p2'].forEach(p => { 
            if(p==='p2' && mode===1) return;
            for(let i=0; i<5; i++) {
                let k = document.createElement('div'); k.className = 'kid';
                k.style.filter = `hue-rotate(${i*70}deg)`;
                document.getElementById(p+'-crowd').appendChild(k);
            }
            newQ(p); 
        });
        loop();
    }

    function newQ(p) {
        let n1 = Math.floor(Math.random()*9)+2, n2 = Math.floor(Math.random()*9)+2;
        state[p].a = n1 * n2;
        document.getElementById(p+'-q').innerText = n1+'x'+n2;
        let c = [state[p].a, state[p].a+2, state[p].a-1].sort(()=>Math.random()-0.5);
        document.getElementById(p+'-opts').innerHTML = c.map(v => `<button class="btn-opt" onclick="check('${p}',${v})">${v}</button>`).join('');
        state[p].t = 100;
    }

    function check(p, v) {
        if(!state.active) return;
        if(v === state[p].a) { state[p].s += 100; state[p].p++; }
        else { state[p].p = Math.max(state[p].p-1, 1); }
        document.getElementById(p+'-score').innerText = state[p].s;
        document.getElementById(p+'-sprite').style.bottom = (state[p].p * 6.5) + "%";
        if(state[p].p >= 15) end(p); else newQ(p);
    }

    function loop() {
        if(!state.active) return;
        ['p1', 'p2'].forEach(p => {
            if(p==='p2' && state.m===1) return;
            state[p].t -= 0.4;
            document.getElementById(p+'-timer').style.width = state[p].t + "%";
            if(state[p].t <= 0) { state[p].p = Math.max(state[p].p-1, 1); document.getElementById(p+'-sprite').style.bottom = (state[p].p * 6.5) + "%"; newQ(p); }
        });
        requestAnimationFrame(loop);
    }

    function end(p) {
        state.active = false;
        document.getElementById(p+'-sprite').classList.add('winner-anim');
        setTimeout(() => {
            document.getElementById('victory').style.display = 'flex';
            document.getElementById('win-txt').innerHTML = `JUARA!<br>${p==='p1'?'PEMAIN 1':'PEMAIN 2'}<br>SDN JONO II`;
        }, 1000);
    }
</script>
</body>
</html>
